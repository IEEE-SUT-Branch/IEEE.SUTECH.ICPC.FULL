<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006199",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1c23",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Login | SUTech CP</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="flex-1 flex flex-col items-center justify-center px-4 py-12">
<div class="w-full max-w-md">
<div class="flex justify-center items-center gap-8 mb-10">
<div class="flex flex-col items-center gap-2">
<div class="w-16 h-16 bg-primary/10 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">school</span>
</div>
<span class="text-xs font-bold uppercase tracking-wider text-slate-500">SUTech</span>
</div>
<div class="h-10 w-px bg-slate-300 dark:bg-slate-700"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-16 h-16 bg-primary/10 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl">hub</span>
</div>
<span class="text-xs font-bold uppercase tracking-wider text-slate-500">IEEE SUTech</span>
</div>
</div>
<div class="bg-white dark:bg-slate-800/50 p-8 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700">
<div class="text-center mb-8">
<h1 class="text-3xl font-bold text-primary mb-2">Competitive Programming</h1>
<p class="text-slate-500 dark:text-slate-400">Sign in to your student account to continue</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">alternate_email</span>
                            University Email
                        </label>
<input class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-white" placeholder="student@sut.edu.eg" type="email"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">lock</span>
                            Student ID / Password
                        </label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-white" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="rounded border-slate-300 text-primary focus:ring-primary" type="checkbox"/>
<span class="text-sm text-slate-500 group-hover:text-slate-700 dark:group-hover:text-slate-300 transition-colors">Remember me</span>
</label>
<a class="text-sm font-medium text-primary hover:underline" href="#">Forgot ID?</a>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
                        Login
                        <span class="material-symbols-outlined">login</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700">
<div class="flex justify-center gap-4">
<button class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-primary/10 hover:text-primary transition-colors text-slate-600 dark:text-slate-400">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.341-3.369-1.341-.454-1.152-1.11-1.459-1.11-1.459-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.087.635-1.337-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12c0-5.523-4.477-10-10-10z"></path></svg>
</button>
<button class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-primary/10 hover:text-primary transition-colors text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">forum</span>
</button>
</div>
</div>
</div>
<p class="text-center mt-8 text-slate-500 text-sm font-medium">
                Don't have an account? 
                <a class="text-primary hover:underline font-bold" href="#">Contact Admin</a>
</p>
</div>
</div>
<footer class="w-full py-8 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50">
<div class="max-w-7xl mx-auto px-4 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 text-slate-400">
<span class="material-symbols-outlined text-lg">code</span>
<span class="text-sm">Built by </span>
<span class="font-bold text-slate-700 dark:text-slate-300">SUTech IEEE Student Branch</span>
</div>
<div class="flex gap-6 text-xs text-slate-400">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Platform Status</a>
</div>
<p class="text-[10px] text-slate-500 uppercase tracking-widest mt-2">© 2024 SUTech Competitive Programming</p>
</div>
</footer>
</body></html>
